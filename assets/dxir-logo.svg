<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="dxirLogoTitle dxirLogoDesc">
  <title id="dxirLogoTitle">DXIR Company Logo</title>
  <desc id="dxirLogoDesc">A custom geometric DXIR logo with a spark emblem and gradient wordmark on a transparent background.</desc>

  <defs>
    <linearGradient id="inkNavy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1C3E"/>
      <stop offset="100%" stop-color="#11356D"/>
    </linearGradient>
    <linearGradient id="inkPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9B5BFF"/>
      <stop offset="100%" stop-color="#5B1FD6"/>
    </linearGradient>
    <linearGradient id="inkMix" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1C3E"/>
      <stop offset="50%" stop-color="#163D78"/>
      <stop offset="100%" stop-color="#8A4CFF"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(40 40)" filter="url(#softGlow)">
